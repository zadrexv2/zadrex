<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liderlik Tablosu - CrackerVoid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="legal-bar">
  ⚠ CrackerVoid yalnızca eğitim amaçlıdır. Paylaşılan içeriklerden yalnızca paylaşan kişi sorumludur. Site hiçbir hukuki sorumluluk kabul etmez. Kayıt olarak bu şartları kabul etmiş sayılırsın.
</div>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">Cracker<span>Void</span></a>
  <button class="hamburger" id="hamburger-btn">☰</button>
  <ul class="navbar-nav">
    <li><a href="index.html">Ana Sayfa</a></li>
    <li><a href="leaderboard.html" class="active">Liderlik</a></li>
    <li><a href="users.html">👥 Üyeler</a></li>
  </ul>
  <div id="nav-right" style="display:flex;align-items:center;gap:8px;"></div>
</nav>
<div class="container" style="max-width:900px">
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="lb-tab-btn active" data-tab="money">💰 En Zengin</button>
    <button class="lb-tab-btn" data-tab="posts">💬 En Aktif</button>
    <button class="lb-tab-btn" data-tab="threads">📋 En Çok Konu</button>
  </div>
  <div id="lb-list"><div class="empty-msg">Yükleniyor...</div></div>
</div>
<footer>&copy; 2026 <span>CrackerVoid</span></footer>
<script src="api.js"></script>
<script>
let _lbUsers = [], _lbThreads = [], _currentTab = 'money';

document.addEventListener('DOMContentLoaded', async () => {
  const user = await Auth.init();
  const navRight = document.getElementById('nav-right');
  if (user) {
    navRight.innerHTML = `<a href="notifications.html" class="btn btn-outline btn-sm">🔔</a>
      <a href="messages.html" class="btn btn-outline btn-sm">✉</a>
      <a href="profile.html" class="btn btn-outline btn-sm">${escHtml(user.username)}</a>
      <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Çıkış</button>`;
  } else {
    navRight.innerHTML = `<a href="login.html" class="btn btn-outline btn-sm">Giriş</a>
      <a href="register.html" class="btn btn-primary btn-sm">Kayıt Ol</a>`;
  }

  const [users, threads] = await Promise.all([apiFetch('/api/users'), Forum.getThreads()]);
  const moneyData = {};
  await Promise.all(users.map(async u => { moneyData[u.username] = await Money.get(u.username); }));
  _lbUsers = users.map(u => ({ ...u, _money: moneyData[u.username] || 0 }));
  _lbThreads = Array.isArray(threads) ? threads : [];

  document.querySelectorAll('.lb-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lb-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _currentTab = btn.dataset.tab;
      renderLB(_currentTab);
    });
  });

  renderLB(_currentTab);
});

function renderLB(tab) {
  let sorted = _lbUsers.map(u => ({
    ...u,
    threadCount: _lbThreads.filter(t => t.author === u.username).length
  }));

  if (tab === 'money')   sorted.sort((a,b) => b._money - a._money);
  if (tab === 'posts')   sorted.sort((a,b) => (b.posts||0) - (a.posts||0));
  if (tab === 'threads') sorted.sort((a,b) => b.threadCount - a.threadCount);

  sorted = sorted.slice(0, 20);
  const medals = ['🥇','🥈','🥉'];
  const valMap = {
    money:   u => '💰 ' + u._money,
    posts:   u => '💬 ' + (u.posts||0),
    threads: u => '📋 ' + u.threadCount
  };

  const el = document.getElementById('lb-list');
  if (!sorted.length) { el.innerHTML = '<div class="empty-msg">Henüz üye yok.</div>'; return; }
  el.innerHTML = sorted.map((u, i) => {
    const rank = getRankFromUser(u, u._money);
    const av = u.avatarImg
      ? `<img src="${u.avatarImg}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`
      : `<div style="width:40px;height:40px;border-radius:50%;background:${rank.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff">${escHtml(u.username[0].toUpperCase())}</div>`;
    const medal = medals[i] || `<span style="font-size:13px;color:var(--text3);font-weight:700">#${i+1}</span>`;
    return `<div class="lb-row${i < 3 ? ' lb-top' : ''}">
      <div class="lb-rank">${medal}</div>
      ${av}
      <div style="flex:1;min-width:0">
        <a href="profile.html?u=${escHtml(u.username)}" style="font-size:14px;font-weight:700;color:${rank.color}">${escHtml(u.username)}</a>
        <div style="font-size:11px;color:var(--text3)">${rank.icon} ${rank.name}</div>
      </div>
      <div style="font-size:15px;font-weight:800;color:var(--accent)">${valMap[tab](u)}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
