<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bildirimler - CrackerVoid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="legal-bar">
  ⚠ CrackerVoid yalnızca eğitim amaçlıdır. Paylaşılan içeriklerden yalnızca paylaşan kişi sorumludur. Site hiçbir hukuki sorumluluk kabul etmez. Kayıt olarak bu şartları kabul etmiş sayılırsın.
</div>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">Cracker<span>Void</span></a>
  <button class="hamburger" id="hamburger-btn">☰</button>
  <ul class="navbar-nav">
    <li><a href="index.html">Ana Sayfa</a></li>
  </ul>
  <div id="nav-right" style="display:flex;align-items:center;gap:8px;"></div>
</nav>
<div class="container" style="max-width:700px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="font-size:16px;font-weight:800;color:var(--text)">🔔 Bildirimler</h2>
    <button class="btn btn-outline btn-sm" onclick="markAll()">Tümünü Okundu İşaretle</button>
  </div>
  <div id="notif-list"></div>
</div>
<footer>© 2026 <span>CrackerVoid</span></footer>
<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = await Auth.init();
  if (!user) { window.location.href = 'login.html?r=' + encodeURIComponent(location.href); return; }

  const navRight = document.getElementById('nav-right');
  navRight.innerHTML = `<a href="messages.html" class="btn btn-outline btn-sm">✉</a>
    <a href="profile.html" class="btn btn-outline btn-sm">${escHtml(user.username)}</a>
    <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Çıkış</button>`;

  await Notif.markRead();
  await render();

  async function render() {
    const notifs = await Notif.get();
    const el = document.getElementById('notif-list');
    if (!Array.isArray(notifs) || !notifs.length) {
      el.innerHTML = '<div class="empty-msg">Henüz bildirim yok.</div>';
      return;
    }
    const icons = { like:'👍', reply:'💬', follow:'👤', dm:'✉' };
    el.innerHTML = notifs.map(n => `
      <div class="notif-item${n.read ? '' : ' notif-unread'}">
        <span class="notif-icon">${icons[n.type] || '🔔'}</span>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--text)">${escHtml(n.msg)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${n.time}</div>
        </div>
        ${n.link ? `<a href="${escHtml(n.link)}" class="btn btn-outline btn-sm" style="font-size:11px">Git</a>` : ''}
      </div>`).join('');
  }

  window.markAll = async function() {
    await Notif.markRead();
    await render();
  };
});
</script>
</body>
</html>
