<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - CrackerVoid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="legal-bar">
  ⚠ CrackerVoid yalnızca eğitim amaçlıdır. Paylaşılan içeriklerden yalnızca paylaşan kişi sorumludur. Site hiçbir hukuki sorumluluk kabul etmez. Kayıt olarak bu şartları kabul etmiş sayılırsın.
</div>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">Cracker<span>Void</span></a>
  <ul class="navbar-nav"><li><a href="index.html">Ana Sayfa</a></li></ul>
  <div id="nav-right" style="display:flex;align-items:center;gap:8px;"></div>
</nav>
<div class="auth-wrapper">
  <div class="auth-box">
    <h2>Giriş Yap</h2>
    <p class="sub">Hesabına giriş yap ve topluluğa katıl.</p>
    <div id="alert-box" class="alert alert-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="kullaniciadi" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Giriş Yap</button>
    </form>
    <div class="form-footer">Hesabın yok mu? <a href="register.html">Kayıt Ol</a></div>
  </div>
</div>
<script src="api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const alertEl = document.getElementById('alert-box');
  alertEl.style.display = 'none';
  const d = await Auth.login(u, p);
  if (d.ok) {
    const r = new URLSearchParams(location.search).get('r');
    window.location.href = r || 'index.html';
  } else if (d.msg === 'banned') {
    alertEl.textContent = 'Hesabın banlandı.';
    alertEl.style.display = 'block';
  } else {
    alertEl.textContent = d.msg || 'Kullanıcı adı veya şifre hatalı.';
    alertEl.style.display = 'block';
  }
});
</script>
